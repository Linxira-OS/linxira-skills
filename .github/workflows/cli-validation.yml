name: CLI Validation

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Audit first-party skill metadata
        shell: pwsh
        run: ./scripts/audit-first-party-skills.ps1
      - run: npm test
      - run: npm run pack:check

  linux-distributions:
    name: ${{ matrix.name }} / Node 24
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian 12
            image: debian:12-slim
            bootstrap: apt-get update && apt-get install -y ca-certificates git
          - name: Fedora 42
            image: fedora:42
            bootstrap: dnf install -y ca-certificates git
          - name: Arch Linux
            image: archlinux:base
            bootstrap: pacman -Syu --noconfirm ca-certificates git
    steps:
      - name: Install checkout prerequisites
        run: ${{ matrix.bootstrap }}
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node --version
      - run: npm test
      - run: npm run pack:check

  academic-artifacts-ubuntu:
    name: Academic artifact E2E / Ubuntu / Node 24
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install document and rendering tools
        run: sudo apt-get update && sudo apt-get install -y pandoc libreoffice poppler-utils latexmk texlive-xetex texlive-bibtex-extra biber fonts-liberation fonts-lmodern
      - name: Verify Ubuntu artifact toolchain
        run: node skills/academic-delivery-planning/scripts/check-academic-toolchain.mjs --require-all
      - name: Generate and render academic artifacts
        run: LINXIRA_ACADEMIC_E2E=1 npm test

  academic-artifacts-arch:
    name: Academic artifact E2E / Arch Linux / Node 24
    runs-on: ubuntu-latest
    container:
      image: archlinux:base
    steps:
      - name: Install Arch artifact toolchain and checkout prerequisites
        run: pacman -Syu --noconfirm --needed ca-certificates git pandoc-cli libreoffice-fresh poppler texlive-binextra texlive-xetex texlive-latexrecommended texlive-bibtexextra biber otf-latin-modern ttf-liberation
      - name: Activate Arch artifact toolchain paths and fonts
        run: printf '%s\n' /usr/bin/vendor_perl >> "$GITHUB_PATH" && fc-cache -f
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify Arch artifact toolchain
        run: node skills/academic-delivery-planning/scripts/check-academic-toolchain.mjs --require-all
      - name: Generate and render academic artifacts
        run: LINXIRA_ACADEMIC_E2E=1 npm test

  academic-pptx-windows:
    name: Academic PPTX E2E / Windows / Node 24
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Generate materialized PPTX artifact
        shell: pwsh
        run: $env:LINXIRA_ACADEMIC_PPTX_E2E = '1'; npm test
